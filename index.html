<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitHub 이미지 뷰어</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .gallery img { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .gallery img:hover { transform: scale(1.05); }
        /* 모달 창 스타일 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>📸 나의 이미지 갤러리</h1>
    <div class="gallery" id="gallery"></div>

    <!-- 크게 보기 모달 -->
    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="크게 보기">
    </div>

    <script>
        // ⚠️ 본인의 환경에 맞게 아래 3개 변수를 수정하세요!
        const username = "본인의_깃허브_아이디";
        const repo = "저장소_이름";
        const folderPath = "이미지가_모여있는_폴더명"; // 예: "images" 또는 "assets/photos"

        // GitHub API를 통해 폴더 내 파일 목록 가져오기
        const apiUrl = `https://github.com{"comeback-zunny"}/${"AIT-Storage"}/contents/${"playing"}`;

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                // 이미지 확장자 필터링
                const images = data.filter(file => /\.(jpe?g|png|gif|webp|bmp)$/i.test(file.name));
                
                images.forEach(img => {
                    const imageElement = document.createElement('img');
                    imageElement.src = img.download_url; // 원본 이미지 주소
                    imageElement.onclick = () => {
                        document.getElementById('modal-img').src = img.download_url;
                        document.getElementById('modal').style.display = 'flex';
                    };
                    gallery.appendChild(imageElement);
                });
            })
            .catch(err => console.error("이미지를 불러오지 못했습니다:", err));
    </script>
</body>
</html>
