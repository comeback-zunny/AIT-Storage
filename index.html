<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIT Storage Image Viewer</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f1115;
            --panel: #171a21;
            --panel-strong: #202531;
            --text: #f4f7fb;
            --muted: #a7b0c0;
            --accent: #7dd3fc;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(125, 211, 252, 0.16), transparent 30%), var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 17, 21, 0.86);
            backdrop-filter: blur(16px);
        }

        .header-inner {
            width: min(1280px, 100%);
            margin: 0 auto;
            padding: 22px 20px 16px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(24px, 4vw, 40px);
            line-height: 1.1;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-top: 18px;
        }

        .search {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0 16px;
            background: var(--panel);
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        button {
            border: 0;
            color: inherit;
            font: inherit;
            cursor: pointer;
        }

        main {
            width: min(1280px, 100%);
            margin: 0 auto;
            padding: 24px 20px 72px;
        }

        .status {
            display: grid;
            place-items: center;
            min-height: 220px;
            color: var(--muted);
            text-align: center;
        }

        .category-home {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            min-height: 320px;
            align-items: stretch;
        }

        .category-card {
            position: relative;
            overflow: hidden;
            display: flex;
            min-height: 240px;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 26px;
            background: #171a21;
            box-shadow: var(--shadow);
            text-align: left;
        }

        .category-card-thumb {
            position: absolute;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.18s ease;
        }

        .category-card-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(180deg, rgba(15, 17, 21, 0.15), rgba(15, 17, 21, 0.72));
            pointer-events: none;
        }

        .category-card:hover {
            border-color: rgba(125, 211, 252, 0.55);
        }

        .category-card:hover .category-card-thumb {
            transform: scale(1.04);
        }

        .category-card strong {
            position: relative;
            z-index: 2;
            display: block;
            font-size: clamp(30px, 5vw, 54px);
            letter-spacing: 0.08em;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.65);
        }

        .category-card span {
            position: relative;
            z-index: 2;
            margin-top: 10px;
            color: #d7dee9;
            font-size: 14px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65);
        }

        .view-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .view-title {
            margin: 0;
            font-size: clamp(28px, 5vw, 48px);
            letter-spacing: 0.08em;
        }

        .section {
            margin-bottom: 34px;
        }

        .section-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .section-title {
            margin: 0;
            font-size: 20px;
        }

        .section-meta {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .folder-button {
            min-height: 34px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0 12px;
            background: var(--panel-strong);
            color: var(--text);
            font-size: 13px;
        }

        .home-button {
            min-height: 38px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0 14px;
            background: var(--panel);
            color: var(--text);
            font-size: 13px;
        }

        .folder-button:hover {
            border-color: rgba(125, 211, 252, 0.45);
            background: rgba(125, 211, 252, 0.14);
        }

        .home-button:hover {
            border-color: rgba(125, 211, 252, 0.45);
            background: rgba(125, 211, 252, 0.14);
        }

        .floating-back-button {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 20;
            min-height: 46px;
            border: 1px solid rgba(125, 211, 252, 0.45);
            border-radius: 999px;
            padding: 0 18px;
            background: rgba(32, 37, 49, 0.92);
            box-shadow: var(--shadow);
            color: var(--text);
            font-size: 14px;
            backdrop-filter: blur(12px);
        }

        .floating-back-button:hover {
            background: rgba(125, 211, 252, 0.18);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        .card {
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .thumb-button {
            display: block;
            width: 100%;
            padding: 0;
            background: #11151c;
        }

        .thumb {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .thumb-button:hover .thumb {
            transform: scale(1.04);
            opacity: 0.9;
        }

        .caption {
            padding: 10px 12px 12px;
            text-align: left;
        }

        .caption strong {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }

        .caption span {
            display: block;
            overflow: hidden;
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            background: rgba(0, 0, 0, 0.92);
        }

        .modal.open {
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .modal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 18px;
            background: rgba(15, 17, 21, 0.78);
        }

        .modal-title {
            overflow: hidden;
            color: var(--muted);
            font-size: 14px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-button {
            min-width: 40px;
            min-height: 40px;
            border-radius: 999px;
            background: var(--panel-strong);
        }

        .modal-stage {
            display: grid;
            place-items: center;
            min-height: 0;
            padding: 16px;
        }

        .modal-stage img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            object-fit: contain;
        }

        .modal-footer {
            padding: 12px 18px 18px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 760px) {
            .toolbar {
                grid-template-columns: 1fr;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            }

            .category-home {
                grid-template-columns: 1fr;
            }

            .category-card {
                min-height: 180px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>AIT 이미지 뷰어</h1>
            <p class="subtitle">GitHub 저장소의 폴더 구조를 읽어 PLAYING과 HISTORY 스크린샷을 보여줍니다.</p>
            <div class="toolbar">
                <input class="search" id="search" type="search" placeholder="게임명, 폴더명, 파일명 검색">
            </div>
        </div>
    </header>

    <main id="app">
        <div class="status">이미지 목록을 불러오는 중입니다...</div>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal-bar">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-actions">
                <button class="modal-button" id="prevButton" type="button" aria-label="이전 이미지">‹</button>
                <button class="modal-button" id="nextButton" type="button" aria-label="다음 이미지">›</button>
                <button class="modal-button" id="closeButton" type="button" aria-label="닫기">×</button>
            </div>
        </div>
        <div class="modal-stage" id="modalStage">
            <img id="modalImage" src="" alt="">
        </div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>

    <script>
        const repoConfig = {
            owner: "comeback-zunny",
            repo: "AIT-Storage",
            branch: "main"
        };

        const categoryLabels = {
            playing: "PLAYING",
            history: "HISTORY",
            "app-icon": "앱 아이콘"
        };

        const categoryThumbnails = {
            playing: "playing/thumbnail.png",
            history: "history/thumbnail.png",
            "app-icon": "app-icon/thumbnail.png"
        };

        const imageExtensions = new Set([".jpg", ".jpeg", ".png", ".gif", ".webp", ".avif"]);
        const previewLimit = 5;
        const app = document.getElementById("app");
        const toolbar = document.querySelector(".toolbar");
        const search = document.getElementById("search");
        const modal = document.getElementById("modal");
        const modalImage = document.getElementById("modalImage");
        const modalTitle = document.getElementById("modalTitle");
        const modalFooter = document.getElementById("modalFooter");
        const modalStage = document.getElementById("modalStage");
        const prevButton = document.getElementById("prevButton");
        const nextButton = document.getElementById("nextButton");
        const closeButton = document.getElementById("closeButton");

        let allImages = [];
        let visibleImages = [];
        let activeFilter = "";
        let activeFolderKey = "";
        let currentIndex = -1;

        init();

        async function init() {
            try {
                allImages = await loadImages();
                render();
            } catch (error) {
                app.innerHTML = `
                    <div class="status">
                        <div>
                            <p>이미지 목록을 불러오지 못했습니다.</p>
                            <p>${escapeHtml(error.message)}</p>
                        </div>
                    </div>
                `;
            }
        }

        async function loadImages() {
            const apiUrl = `https://api.github.com/repos/${repoConfig.owner}/${repoConfig.repo}/git/trees/${repoConfig.branch}?recursive=1`;
            const response = await fetch(apiUrl);

            if (!response.ok) {
                throw new Error(`GitHub API 응답 오류: ${response.status}`);
            }

            const data = await response.json();
            const images = data.tree
                .filter((item) => item.type === "blob" && isImagePath(item.path))
                .map(toImageItem)
                .filter(Boolean)
                .sort((a, b) => a.sortKey.localeCompare(b.sortKey, "ko", { numeric: true }));

            if (images.length === 0) {
                throw new Error("playing, history, app-icon 폴더에서 이미지를 찾지 못했습니다.");
            }

            return images;
        }

        function isImagePath(path) {
            const lowerPath = path.toLowerCase();
            const extension = lowerPath.slice(lowerPath.lastIndexOf("."));
            return imageExtensions.has(extension) && /^(playing|history|app-icon)\//.test(path) && !isCategoryThumbnailPath(path);
        }

        function isCategoryThumbnailPath(path) {
            return Object.values(categoryThumbnails).includes(path);
        }

        function toImageItem(item) {
            const parts = item.path.split("/");
            const category = parts[0];
            const fileName = parts.at(-1);
            const game = category === "app-icon" ? "App Icon" : parts[1] || "기타";
            const album = category === "app-icon" ? "" : parts.slice(2, -1).join(" / ");
            const title = [categoryLabels[category], game, album].filter(Boolean).join(" / ");
            const sectionName = album ? `${categoryLabels[category]} / ${game} / ${album}` : `${categoryLabels[category]} / ${game}`;
            const sectionKey = `${category}/${game}/${album}`;
            const rawUrl = getRawUrl(item.path);

            return {
                path: item.path,
                url: rawUrl,
                category,
                categoryLabel: categoryLabels[category],
                game,
                album,
                fileName,
                title,
                sectionName,
                sectionKey,
                searchText: `${categoryLabels[category]} ${game} ${album} ${fileName} ${item.path}`.toLowerCase(),
                sortKey: `${category}/${game}/${album}/${fileName}`
            };
        }

        function render() {
            toolbar.hidden = !activeFilter;

            if (!activeFilter) {
                renderHome();
                return;
            }

            const filteredImages = getFilteredImages();

            if (activeFolderKey) {
                renderFolderView(filteredImages);
                return;
            }

            if (filteredImages.length === 0) {
                visibleImages = [];
                app.innerHTML = `
                    <div class="view-head">
                        <h2 class="view-title">${categoryLabels[activeFilter]}</h2>
                        <button class="home-button" type="button" id="homeButton">카테고리 선택</button>
                    </div>
                    <div class="status">조건에 맞는 이미지가 없습니다.</div>
                `;
                bindHomeButton();
                return;
            }

            renderOverview(filteredImages);
        }

        function renderHome() {
            visibleImages = [];
            const categories = ["playing", "history", "app-icon"];

            app.innerHTML = `
                <div class="category-home">
                    ${categories.map((category) => {
                        const count = allImages.filter((image) => image.category === category).length;

                        return `
                            <button class="category-card" type="button" data-category="${category}">
                                <img class="category-card-thumb" src="${getSiteAssetUrl(categoryThumbnails[category])}" alt="">
                                <span class="category-card-overlay" aria-hidden="true"></span>
                                <strong>${categoryLabels[category]}</strong>
                                <span>${count}장 보기</span>
                            </button>
                        `;
                    }).join("")}
                </div>
            `;

            [...app.querySelectorAll(".category-card")].forEach((button) => {
                button.addEventListener("click", () => {
                    activeFilter = button.dataset.category;
                    activeFolderKey = "";
                    search.value = "";
                    render();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        }

        function getFilteredImages() {
            const query = search.value.trim().toLowerCase();
            return allImages.filter((image) => {
                const matchesFilter = image.category === activeFilter;
                const matchesSearch = query === "" || image.searchText.includes(query);
                return matchesFilter && matchesSearch;
            });
        }

        function renderOverview(images) {
            const grouped = groupBySection(images);
            visibleImages = [...grouped.values()].flatMap((group) => group.images.slice(0, previewLimit));

            app.innerHTML = `
                <div class="view-head">
                    <h2 class="view-title">${categoryLabels[activeFilter]}</h2>
                    <button class="home-button" type="button" id="homeButton">카테고리 선택</button>
                </div>
                ${[...grouped.values()].map((group) => {
                const previewImages = group.images.slice(0, previewLimit);
                const hasMore = group.images.length > previewLimit;

                return `
                    <section class="section">
                        <div class="section-head">
                            <h2 class="section-title">${escapeHtml(group.name)}</h2>
                            <div class="section-actions">
                                <span class="section-meta">${group.images.length}장</span>
                                ${hasMore ? `<button class="folder-button" type="button" data-folder-key="${escapeHtml(group.key)}">전체 보기</button>` : ""}
                            </div>
                        </div>
                        <div class="gallery">
                            ${previewImages.map(renderCard).join("")}
                        </div>
                    </section>
                `;
                }).join("")}
            `;

            bindHomeButton();
            bindGalleryEvents();
        }

        function renderFolderView(images) {
            const folderImages = images.filter((image) => image.sectionKey === activeFolderKey);
            const folder = allImages.find((image) => image.sectionKey === activeFolderKey);

            if (folderImages.length === 0) {
                visibleImages = [];
                app.innerHTML = `
                    <section class="section">
                        <div class="section-head">
                            <h2 class="section-title">${escapeHtml(folder?.sectionName || "폴더")}</h2>
                        </div>
                        <div class="status">조건에 맞는 이미지가 없습니다.</div>
                    </section>
                    ${renderBackButton()}
                `;
                bindBackButton();
                return;
            }

            visibleImages = folderImages;
            app.innerHTML = `
                <section class="section">
                    <div class="section-head">
                        <h2 class="section-title">${escapeHtml(folderImages[0].sectionName)}</h2>
                        <div class="section-actions">
                            <span class="section-meta">${folderImages.length}장</span>
                        </div>
                    </div>
                    <div class="gallery">
                        ${folderImages.map(renderCard).join("")}
                    </div>
                </section>
                ${renderBackButton()}
            `;

            bindBackButton();
            bindGalleryEvents();
        }

        function renderBackButton() {
            return '<button class="floating-back-button" type="button" id="backButton">목록으로</button>';
        }

        function bindHomeButton() {
            const homeButton = document.getElementById("homeButton");

            if (!homeButton) {
                return;
            }

            homeButton.addEventListener("click", () => {
                activeFilter = "";
                activeFolderKey = "";
                search.value = "";
                render();
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
        }

        function bindGalleryEvents() {
            [...app.querySelectorAll(".thumb-button")].forEach((button) => {
                button.addEventListener("click", () => openModal(Number(button.dataset.index)));
            });

            [...app.querySelectorAll(".folder-button")].forEach((button) => {
                button.addEventListener("click", () => {
                    activeFolderKey = button.dataset.folderKey;
                    render();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        }

        function bindBackButton() {
            const backButton = document.getElementById("backButton");

            if (!backButton) {
                return;
            }

            backButton.addEventListener("click", () => {
                activeFolderKey = "";
                render();
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
        }

        function groupBySection(images) {
            return images.reduce((groups, image) => {
                if (!groups.has(image.sectionKey)) {
                    groups.set(image.sectionKey, {
                        key: image.sectionKey,
                        name: image.sectionName,
                        images: []
                    });
                }

                groups.get(image.sectionKey).images.push(image);
                return groups;
            }, new Map());
        }

        function renderCard(image) {
            const index = visibleImages.indexOf(image);

            return `
                <article class="card">
                    <button class="thumb-button" type="button" data-index="${index}">
                        <img class="thumb" src="${image.url}" alt="${escapeHtml(image.fileName)}" loading="lazy">
                    </button>
                    <div class="caption">
                        <strong title="${escapeHtml(image.fileName)}">${escapeHtml(image.fileName)}</strong>
                        <span title="${escapeHtml(image.path)}">${escapeHtml(image.path)}</span>
                    </div>
                </article>
            `;
        }

        function openModal(index) {
            currentIndex = index;
            updateModalImage();
            modal.classList.add("open");
            modal.setAttribute("aria-hidden", "false");
        }

        function closeModal() {
            modal.classList.remove("open");
            modal.setAttribute("aria-hidden", "true");
            modalImage.src = "";
            currentIndex = -1;
        }

        function moveModal(delta) {
            if (visibleImages.length === 0 || currentIndex < 0) {
                return;
            }

            currentIndex = (currentIndex + delta + visibleImages.length) % visibleImages.length;
            updateModalImage();
        }

        function updateModalImage() {
            const image = visibleImages[currentIndex];
            modalImage.src = image.url;
            modalImage.alt = image.fileName;
            modalTitle.textContent = image.path;
            modalFooter.textContent = `${currentIndex + 1} / ${visibleImages.length} - ${image.title}`;
        }

        function encodePath(path) {
            return path.split("/").map(encodeURIComponent).join("/");
        }

        function getRawUrl(path) {
            return `https://raw.githubusercontent.com/${repoConfig.owner}/${repoConfig.repo}/${repoConfig.branch}/${encodePath(path)}`;
        }

        function getSiteAssetUrl(path) {
            return new URL(encodePath(path), window.location.href).href;
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;"
            })[char]);
        }

        search.addEventListener("input", render);
        closeButton.addEventListener("click", closeModal);
        prevButton.addEventListener("click", () => moveModal(-1));
        nextButton.addEventListener("click", () => moveModal(1));
        modalStage.addEventListener("click", closeModal);

        document.addEventListener("keydown", (event) => {
            if (!modal.classList.contains("open")) {
                return;
            }

            if (event.key === "Escape") closeModal();
            if (event.key === "ArrowLeft") moveModal(-1);
            if (event.key === "ArrowRight") moveModal(1);
        });
    </script>
</body>
</html>
