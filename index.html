<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitHub 이미지 뷰어</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .gallery img { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .gallery img:hover { transform: scale(1.05); }
        /* 모달 창 스타일 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>📸 나의 이미지 갤러리</h1>
    <div class="gallery" id="gallery"></div>

    <!-- 크게 보기 모달 -->
    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="크게 보기">
    </div>

    <script>
        // 현재 브라우저 주소창에서 자동으로 username과 repo 이름을 추출합니다.
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const username = window.location.hostname.split('.')[0];
        const repo = pathParts[0] || "";

        // 알려주신 폴더 경로 적용 (공백은 그대로 문자로 입력해야 합니다)
        const folderPath = "playing/Jewel Coloring/0NN"; 

        // GitHub API 호출 주소 생성
        const apiUrl = `https://github.com{username}/${repo}/contents/${folderPath}`;

        fetch(apiUrl)
            .then(res => {
                if (!res.ok) throw new Error("폴더를 찾을 수 없습니다. 경로를 확인해주세요.");
                return res.json();
            })
            .then(data => {
                const gallery = document.getElementById('gallery');
                // 이미지 파일 확장자 필터링
                const images = data.filter(file => /\.(jpe?g|png|gif|webp|bmp)$/i.test(file.name));
                
                if (images.length === 0) {
                    gallery.innerHTML = "<p>폴더 안에 이미지 파일이 없습니다.</p>";
                    return;
                }

                images.forEach(img => {
                    const imageElement = document.createElement('img');
                    imageElement.src = img.download_url;
                    imageElement.onclick = () => {
                        document.getElementById('modal-img').src = img.download_url;
                        document.getElementById('modal').style.display = 'flex';
                    };
                    gallery.appendChild(imageElement);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('gallery').innerHTML = `<p style="color:red;">${err.message}</p>`;
            });
    </script>
</body>
</html>
