<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GitHub 이미지 뷰어</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        h1 { padding: 20px 0 10px 0; font-size: 24px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .gallery img { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #222; }
        .gallery img:hover { transform: scale(1.05); }
        /* 모달 창 스타일 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>📸 나의 이미지 갤러리_02</h1>
    <div class="gallery" id="gallery"></div>

    <!-- 크게 보기 모달 -->
    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="크게 보기">
    </div>

    <script>
        // 이미지 폴더 내부의 파일 규칙을 기반으로 직접 주소를 생성합니다 (차단 없음)
        const baseUrl = "https://githubusercontent.com";
        const gallery = document.getElementById('gallery');

        // 폴더 내부의 이미지 파일 목록 배열 생성 (002번부터 055번까지 자동 등록)
        const imageFiles = [];
        
        for (let i = 2; i <= 55; i++) {
            const num = String(i).padStart(3, '0'); // 002, 003... 형식 맞추기
            
            // 004, 030, 031, 051, 053, 054, 055번은 jpg 형식 대응
            if ([4, 30, 31, 51, 53, 54, 55].includes(i)) {
                imageFiles.push(`${num}-a.jpg`, `${num}-b.jpg`);
            } else {
                // 특정 번호의 'a' 파일이 없는 예외 처리 (008, 017, 021, 025, 040, 045, 047, 050번은 b만 존재)
                if (![8, 17, 21, 25, 40, 45, 47, 50].includes(i)) {
                    imageFiles.push(`${num}-a.png`);
                }
                imageFiles.push(`${num}-b.png`);
            }
        }

        // 이미지 화면에 그리기
        imageFiles.forEach(fileName => {
            const imgUrl = baseUrl + fileName;
            const imageElement = document.createElement('img');
            imageElement.src = imgUrl;
            imageElement.alt = fileName;
            
            // 이미지가 로드에 성공했을 때만 화면에 표시
            imageElement.onload = () => {
                gallery.appendChild(imageElement);
            };
            
            // 이미지 클릭 시 모달창 열기
            imageElement.onclick = () => {
                document.getElementById('modal-img').src = imgUrl;
                document.getElementById('modal').style.display = 'flex';
            };
        });
    </script>
</body>
</html>
